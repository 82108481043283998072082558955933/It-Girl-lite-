name: Update It Girl Lite one-month promo

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-it-girl-lite-promo.yml

permissions:
  contents: write

jobs:
  update-promo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update promotion dates and messaging
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          required = [
              'Wednesday, July 15 at 11:59 PM ET',
              '2026-07-16T03:59:59Z',
              '<div class="topbar" id="offerTopbar">$27 founder price ends Wednesday, July 15 at 11:59 PM ET</div>',
              '<strong>Fixed founder deadline:</strong>',
          ]
          missing = [value for value in required if value not in text]
          if missing:
              raise SystemExit(f'Expected promo text was not found: {missing}')

          text = text.replace(
              '<div class="topbar" id="offerTopbar">$27 founder price ends Wednesday, July 15 at 11:59 PM ET</div>',
              '<div class="topbar" id="offerTopbar">One-month promo: $27 founder price ends Sunday, August 16 at 11:59 PM ET</div>'
          )
          text = text.replace(
              '<strong>Fixed founder deadline:</strong>',
              '<strong>One-month founder promo:</strong>'
          )
          text = text.replace(
              'Wednesday, July 15 at 11:59 PM ET',
              'Sunday, August 16 at 11:59 PM ET'
          )
          text = text.replace(
              'July 15 at 11:59 PM ET',
              'August 16 at 11:59 PM ET'
          )
          text = text.replace('through July 15', 'through August 16')
          text = text.replace('2026-07-16T03:59:59Z', '2026-08-17T03:59:59Z')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit the updated page and remove this one-use workflow
        run: |
          rm .github/workflows/update-it-girl-lite-promo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-it-girl-lite-promo.yml
          git commit -m "Run It Girl Lite promo through August 16"
          git push origin HEAD:main
